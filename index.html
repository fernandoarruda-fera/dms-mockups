(function () {
  var telas = [
    { src: 'tela01-catalogo-tags.html',            grp: 'Catálogos',           label: '01 · Catálogo de Tags' },

    { src: 'tela16-cockpit-overview.html',         grp: 'Cockpit',             label: '16 · Cockpit Overview' },
    { src: 'tela17-cockpit-email.html',            grp: 'Cockpit',             label: '17 · Cockpit Email' },
    { src: 'tela18-cockpit-todo.html',             grp: 'Cockpit',             label: '18 · Cockpit To-Do' },
    { src: 'tela19-cockpit-followup.html',         grp: 'Cockpit',             label: '19 · Cockpit Follow-up' },
    { src: 'tela20-cockpit-update.html',           grp: 'Cockpit',             label: '20 · Cockpit Update' },
    { src: 'tela21-requisicoes-list.html',         grp: 'Compras',             label: '21 · Requisições — Lista' },
    { src: 'tela22-requisicao-form.html',          grp: 'Compras',             label: '22 · Requisição — Form' },
    { src: 'tela23-requisicao-detalhe.html',       grp: 'Compras',             label: '23 · Requisição — Detalhe' },
    { src: 'tela24-cotacoes-list.html',            grp: 'Compras',             label: '24 · Cotações — Lista' },

    { src: 'tela26-cotacao-detalhe.html',          grp: 'Compras',             label: '26 · Cotação — Detalhe' },
    { src: 'tela27-pedidos-list.html',             grp: 'Compras',             label: '27 · Pedidos — Lista' },

    { src: 'tela33-centro-custo-form.html',        grp: 'Cadastros',           label: '33 · Centro de Custo — Form' },
    { src: 'tela34-plano-contas-list.html',        grp: 'Cadastros',           label: '34 · Plano de Contas — Árvore' },
    { src: 'tela35-plano-conta-form.html',         grp: 'Cadastros',           label: '35 · Conta Contábil — Form' },
    { src: 'tela36-pre-lancamentos-list.html',     grp: 'Cadastros',           label: '36 · Pré-lançamentos — Lista' },
    { src: 'tela37-pre-lancamento-detalhe.html',   grp: 'Cadastros',           label: '37 · Pré-lançamento — Detalhe' },

    { src: 'tela47-login.html',                    grp: 'Conta & Autenticação',  label: '47 · Login' },
    { src: 'tela48-reset-senha-request.html',      grp: 'Conta & Autenticação',  label: '48 · Esqueci minha senha' },
    { src: 'tela49-reset-senha-nova.html',         grp: 'Conta & Autenticação',  label: '49 · Definir nova senha' },
    { src: 'tela50-profile.html',                  grp: 'Conta & Autenticação',  label: '50 · Meu Perfil' },
    { src: 'tela51-trocar-senha.html',             grp: 'Conta & Autenticação',  label: '51 · Trocar senha' },
    { src: 'tela52-2fa-setup.html',                grp: 'Conta & Autenticação',  label: '52 · Configurar 2FA' },
    { src: 'tela53-2fa-challenge.html',            grp: 'Conta & Autenticação',  label: '53 · Verificação 2FA' },
    { src: 'tela54-erro-404.html',                 grp: 'Estados de Sistema',    label: '54 · Erro 404 · Não encontrada' },
    { src: 'tela55-erro-403.html',                 grp: 'Estados de Sistema',    label: '55 · Erro 403 · Acesso negado' },
    { src: 'tela56-erro-500.html',                 grp: 'Estados de Sistema',    label: '56 · Erro 500 · Falha do servidor' },
    { src: 'tela57-sessao-expirada.html',          grp: 'Estados de Sistema',    label: '57 · Sessão expirada' },
    { src: 'tela58-manutencao.html',               grp: 'Estados de Sistema',    label: '58 · Em manutenção' },
    { src: 'tela59-empty-state-showcase.html',     grp: 'Estados de Sistema',    label: '59 · Empty States — Showcase' }
  ];

  var sel = document.getElementById('tela-select');
  var viewer = document.getElementById('viewer');
  var prev = document.getElementById('prev-btn');
  var next = document.getElementById('next-btn');

  // Build optgroups
  var groups = {};
  telas.forEach(function (t) { (groups[t.grp] = groups[t.grp] || []).push(t); });
  Object.keys(groups).forEach(function (g) {
    var og = document.createElement('optgroup');
    og.label = g;
    groups[g].forEach(function (t) {
      var o = document.createElement('option');
      o.value = t.src;
      o.textContent = t.label;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });

  function indexOf(src) {
    for (var i = 0; i < telas.length; i++) if (telas[i].src === src) return i;
    return 0;
  }

  function load(src, pushHash) {
    viewer.src = src;
    sel.value = src;
    if (pushHash !== false) location.hash = src;
    var i = indexOf(src);
    prev.disabled = i <= 0;
    next.disabled = i >= telas.length - 1;
  }

  function fromHash() {
    var h = (location.hash || '').replace(/^#/, '');
    load(h || telas[0].src, false);
  }

  sel.addEventListener('change', function () { load(sel.value); });
  prev.addEventListener('click', function () { var i = indexOf(sel.value); if (i > 0) load(telas[i - 1].src); });
  next.addEventListener('click', function () { var i = indexOf(sel.value); if (i < telas.length - 1) load(telas[i + 1].src); });
  window.addEventListener('hashchange', fromHash);
  fromHash();
})();
</script>
