<style>
  body { font-family: 'Montserrat', Verdana, sans-serif; background: #F8F9FA; color: #1A1A1A; margin: 0; }
  .tilt-skew-d { transform: skewX(-16.5deg); display: inline-block; }
  .mono { font-family: 'JetBrains Mono', Consolas, monospace; }
  iframe#viewer { border: 0; background: #FFFFFF; display: block; width: 100%; height: 100%; }

  .nav-btn { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2); border-radius: 6px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .nav-btn:hover { background: rgba(255,255,255,.18); }
  .nav-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Screen picker trigger (substitui o <select> nativo) */
  #screen-picker-trigger { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); color: #fff; padding: 6px 10px 6px 12px; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; cursor: pointer; min-width: 0; max-width: 420px; transition: background .12s ease, border-color .12s ease; }
  #screen-picker-trigger:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.32); }
  #screen-picker-trigger .sp-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: .72; white-space: nowrap; }
  #screen-picker-trigger .sp-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  #screen-picker-trigger svg { opacity: .7; flex-shrink: 0; }

  /* Brand marker DMSYS V2 (lado direito) */
  #brand-marker { display: flex; align-items: center; gap: 8px; padding: 0 10px; height: 32px; border-left: 1px solid rgba(255,255,255,.14); border-right: 1px solid rgba(255,255,255,.14); }
  #brand-marker .bm-d { width: 24px; height: 24px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  #brand-marker .bm-d span { color: #00386C; font-weight: 900; font-size: 14px; line-height: 1; }
  #brand-marker .bm-text { font-weight: 700; font-size: 13px; color: #fff; letter-spacing: 0.02em; }

  /* Modal searchable de telas */
  #screen-picker-modal { position: fixed; inset: 0; z-index: 10000; display: none; }
  #screen-picker-modal.is-open { display: block; }
  #sp-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.42); backdrop-filter: blur(2px); }
  #sp-panel { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 580px; max-height: calc(100vh - 110px); background: #fff; border-radius: 12px; box-shadow: 0 24px 60px rgba(0,0,0,0.28); overflow: hidden; display: flex; flex-direction: column; }
  #sp-search-wrap { padding: 14px 16px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; gap: 10px; }
  #sp-search-wrap svg { color: #9CA3AF; flex-shrink: 0; }
  #sp-search { flex: 1; border: 0; outline: none; font-size: 15px; font-family: 'Montserrat', sans-serif; color: #1A1A1A; background: transparent; }
  #sp-list { overflow-y: auto; padding: 6px 0 10px; flex: 1; }
  .sp-group { padding: 10px 16px 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; }
  .sp-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; border: 0; background: transparent; width: 100%; text-align: left; font-family: 'Montserrat', sans-serif; font-size: 13px; color: #1A1A1A; }
  .sp-item:hover, .sp-item.is-focused { background: #F1F3F5; }
  .sp-item.is-active { background: rgba(100,53,133,0.08); }
  .sp-item .sp-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6B7280; background: #F1F3F5; padding: 2px 6px; border-radius: 4px; min-width: 36px; text-align: center; flex-shrink: 0; }
  .sp-item.is-active .sp-num { background: #643585; color: #fff; }
  .sp-item .sp-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  #sp-empty { padding: 24px 16px; color: #9CA3AF; font-size: 13px; text-align: center; }
  #sp-footer { padding: 8px 14px; border-top: 1px solid #E5E7EB; font-size: 11px; color: #9CA3AF; display: flex; justify-content: space-between; align-items: center; gap: 12px; background: #FAFAFA; }
  #sp-footer kbd { font-family: 'JetBrains Mono', monospace; background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #6B7280; border: 1px solid #E5E7EB; }

  /* Mobile compact wrapper */
  html.mobile-mode #app-header { height: 36px !important; padding-left: 6px !important; padding-right: 6px !important; gap: 4px !important; }
  html.mobile-mode #app-main { top: 36px !important; }
  html.mobile-mode #brand-marker,
  html.mobile-mode #app-github { display: none !important; }
  html.mobile-mode #screen-picker-trigger { order: 2; padding: 4px 8px; font-size: 12px; max-width: none; flex: 1 1 auto; min-width: 0; }
  html.mobile-mode #screen-picker-trigger .sp-name { font-size: 12px; }
  html.mobile-mode #prev-btn { order: 1; }
  html.mobile-mode #next-btn { order: 3; }
  html.mobile-mode .nav-btn { width: 44px; height: 32px; flex-shrink: 0; }
  html.mobile-mode #sp-panel { top: 44px; width: 96%; max-height: calc(100vh - 60px); }
  html.mobile-mode #sp-footer span:first-child { font-size: 10px; }
</style>

  var trigger = document.getElementById('screen-picker-trigger');
  var triggerCount = trigger.querySelector('.sp-count');
  var triggerName = trigger.querySelector('.sp-name');
  var viewer = document.getElementById('viewer');
  var prev = document.getElementById('prev-btn');
  var next = document.getElementById('next-btn');

  var modal = document.getElementById('screen-picker-modal');
  var backdrop = document.getElementById('sp-backdrop');
  var searchInput = document.getElementById('sp-search');
  var listEl = document.getElementById('sp-list');
  var focusedIdx = 0;
  var currentSrc = telas[0].src;

  if ((window.screen && window.screen.width <= 768) || window.matchMedia('(max-device-width: 768px)').matches) {
    document.documentElement.classList.add('mobile-mode');
  }

  function indexOf(src) {
    for (var i = 0; i < telas.length; i++) if (telas[i].src === src) return i;
    return 0;
  }

  function load(src, pushHash) {
    viewer.src = src;
    currentSrc = src;
    if (pushHash !== false) location.hash = src;
    var i = indexOf(src);
    prev.disabled = i <= 0;
    next.disabled = i >= telas.length - 1;
    triggerCount.textContent = (i + 1) + '/' + telas.length;
    triggerName.textContent = telas[i].label.replace(/^\d+\s*·\s*/, '');
  }

  function fromHash() {
    var h = (location.hash || '').replace(/^#/, '');
    load(h || telas[0].src, false);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function pad2(n) { return n < 10 ? '0' + n : String(n); }

  function renderList(query) {
    query = (query || '').trim().toLowerCase();
    var visible = [];
    var parts = [];
    var lastGroup = null;
    for (var i = 0; i < telas.length; i++) {
      var t = telas[i];
      var num = i + 1;
      var hay = (t.label + ' ' + t.grp + ' ' + num).toLowerCase();
      var match = !query || hay.indexOf(query) !== -1;
      if (!match) continue;
      if (t.grp !== lastGroup) {
        parts.push('<div class="sp-group">' + escapeHtml(t.grp) + '</div>');
        lastGroup = t.grp;
      }
      var name = t.label.replace(/^\d+\s*·\s*/, '');
      var isActive = (t.src === currentSrc);
      var isFocused = (visible.length === focusedIdx);
      var cls = 'sp-item' + (isActive ? ' is-active' : '') + (isFocused ? ' is-focused' : '');
      parts.push(
        '<button type="button" class="' + cls + '" data-src="' + escapeHtml(t.src) + '">' +
          '<span class="sp-num">' + pad2(num) + '</span>' +
          '<span class="sp-label">' + escapeHtml(name) + '</span>' +
        '</button>'
      );
      visible.push(t.src);
    }
    if (!visible.length) {
      listEl.innerHTML = '<div id="sp-empty">Nenhuma tela encontrada para "' + escapeHtml(query) + '".</div>';
    } else {
      listEl.innerHTML = parts.join('');
    }
    listEl._visible = visible;
  }

  function openPicker() {
    modal.classList.add('is-open');
    modal.setAttribute('aria-hidden', 'false');
    searchInput.value = '';
    focusedIdx = Math.max(0, indexOf(currentSrc));
    // First render to set up the visible list
    renderList('');
    // Reset focusedIdx to position of current within visible (full list = all)
    var vis = listEl._visible || [];
    var pos = vis.indexOf(currentSrc);
    if (pos >= 0) {
      focusedIdx = pos;
      renderList('');
    }
    var active = listEl.querySelector('.sp-item.is-active');
    if (active) active.scrollIntoView({ block: 'center' });
    setTimeout(function () { searchInput.focus(); }, 30);
  }

  function closePicker() {
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
  }

  function moveFocus(delta) {
    var vis = listEl._visible || [];
    if (!vis.length) return;
    focusedIdx = Math.max(0, Math.min(vis.length - 1, focusedIdx + delta));
    var items = listEl.querySelectorAll('.sp-item');
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle('is-focused', i === focusedIdx);
    }
    if (items[focusedIdx]) items[focusedIdx].scrollIntoView({ block: 'nearest' });
  }

  function commitFocused() {
    var vis = listEl._visible || [];
    if (!vis.length) return;
    var src = vis[focusedIdx];
    if (src) { load(src); closePicker(); }
  }

  trigger.addEventListener('click', openPicker);
  backdrop.addEventListener('click', closePicker);
  searchInput.addEventListener('input', function () {
    focusedIdx = 0;
    renderList(searchInput.value);
  });
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { closePicker(); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { moveFocus(1); e.preventDefault(); }
    else if (e.key === 'ArrowUp')   { moveFocus(-1); e.preventDefault(); }
    else if (e.key === 'Enter')     { commitFocused(); e.preventDefault(); }
  });
  listEl.addEventListener('click', function (e) {
    var btn = e.target.closest && e.target.closest('.sp-item');
    if (!btn) return;
    var src = btn.getAttribute('data-src');
    if (src) { load(src); closePicker(); }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && modal.classList.contains('is-open')) closePicker();
  });

  prev.addEventListener('click', function () { var i = indexOf(currentSrc); if (i > 0) load(telas[i - 1].src); });
  next.addEventListener('click', function () { var i = indexOf(currentSrc); if (i < telas.length - 1) load(telas[i + 1].src); });
  window.addEventListener('hashchange', fromHash);
  fromHash();
})();
</script>

<script src="i18n-toggle.js" defer></script>
</body>
