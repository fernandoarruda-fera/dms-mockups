<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS — Entrar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  corePlugins: { preflight: true },
  theme: { extend: {
    colors: { dms: { mar: '#00386C', ceu: '#00AEEE', confianca: '#005290', sabedoria: '#643585', tropicalidade: '#B0C934', tecnologia: '#656464' } },
    fontFamily: { sans: ['Montserrat', 'Verdana', 'sans-serif'], mono: ['JetBrains Mono', 'Consolas', 'monospace'] },
    boxShadow: { 'dms-md': '0 4px 6px -1px rgba(0,56,108,.08), 0 2px 4px -1px rgba(0,56,108,.04)', 'dms-lg': '0 20px 25px -5px rgba(0,56,108,.10), 0 10px 10px -5px rgba(0,56,108,.04)' },
  } },
};
</script>
<style>
  body { font-family: 'Montserrat', Verdana, sans-serif; background: linear-gradient(135deg, #F8F9FA 0%, #EFF3F8 100%); color: #1A1A1A; min-height: 100vh; }
  .tilt-accent { transform: skewX(-16.5deg); display: inline-block; }
  .mono { font-family: 'JetBrains Mono', Consolas, monospace; }
  .req::after { content: '*'; color: #DC2626; margin-left: 2px; }
  input:focus { outline: none; border-color: #00AEEE; box-shadow: 0 0 0 3px rgba(0,174,238,.15); }
</style>
</head>
<body class="flex items-center justify-center px-4 py-10">

<div class="w-full max-w-[480px]">

  <!-- Logo / brand -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="w-12 h-12 bg-dms-mar rounded-lg flex items-center justify-center shadow-dms-md">
      <span class="tilt-accent text-white font-black text-2xl leading-none">D</span>
    </div>
    <div class="leading-tight">
      <div class="text-dms-mar font-bold text-xl">DMS Compras</div>
      <div class="text-[11px] text-dms-tecnologia mono uppercase tracking-wider">Plataforma corporativa</div>
    </div>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-xl shadow-dms-lg border border-[#E5E7EB] p-8">

    <h1 class="text-[22px] font-bold text-dms-mar mb-1">Entrar na sua conta</h1>
    <p class="text-sm text-dms-tecnologia mb-6">Use o email corporativo cadastrado pelo administrador.</p>

    <!-- Error placeholder (hidden by default) -->
    <div class="hidden mb-4 px-3.5 py-2.5 bg-red-50 border border-red-200 rounded-md flex items-start gap-2" id="login-error">
      <svg class="w-4 h-4 text-red-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <div class="text-xs text-red-700"><span class="font-semibold">Email ou senha incorretos.</span> Verifique os dados e tente novamente.</div>
    </div>

    <form class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-xs font-semibold text-dms-mar uppercase tracking-wider mb-1.5 req">Email corporativo</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-dms-tecnologia">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input type="email" placeholder="seu.nome@empresa.com.br" class="w-full pl-10 pr-3 py-2.5 text-sm border border-[#E5E7EB] rounded-md transition-colors" value="">
        </div>
      </div>

      <!-- Senha -->
      <div>
        <label class="block text-xs font-semibold text-dms-mar uppercase tracking-wider mb-1.5 req">Senha</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-dms-tecnologia">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-1-7a4 4 0 014 4v3H7V8a4 4 0 014-4z"/></svg>
          </span>
          <input type="password" id="pwd-input" placeholder="••••••••" class="w-full pl-10 pr-10 py-2.5 text-sm border border-[#E5E7EB] rounded-md transition-colors" value="">
          <button type="button" onclick="togglePwd('pwd-input', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-dms-tecnologia hover:text-dms-mar" aria-label="Mostrar/ocultar senha">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.46 12C3.73 7.94 7.52 5 12 5c4.48 0 8.27 2.94 9.54 7-1.27 4.06-5.06 7-9.54 7-4.48 0-8.27-2.94-9.54-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- Remember + forgot -->
      <div class="flex items-center justify-between text-sm pt-1">
        <label class="flex items-center gap-2 cursor-pointer text-gray-700">
          <input type="checkbox" class="w-4 h-4 accent-dms-ceu rounded">
          <span>Lembrar de mim</span>
        </label>
        <a href="tela48-reset-senha-request.html" class="text-dms-ceu hover:text-dms-mar font-medium">Esqueci minha senha</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="w-full py-2.5 bg-dms-sabedoria text-white text-sm font-semibold rounded-md hover:opacity-90 transition-opacity shadow-dms-md mt-2">
        Entrar
      </button>

    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-[#E5E7EB]"></div></div>
      <div class="relative flex justify-center text-xs"><span class="bg-white px-3 text-dms-tecnologia uppercase tracking-wider">ou continuar com</span></div>
    </div>

    <!-- SSO -->
    <button type="button" class="w-full py-2.5 border border-[#E5E7EB] rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2.5">
      <svg class="w-4 h-4" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      Entrar com Microsoft
    </button>

  </div>

  <!-- Footer -->
  <p class="text-center text-xs text-dms-tecnologia mt-6">
    Não tem conta? <span class="text-gray-700">Solicite acesso ao administrador.</span>
  </p>
  <p class="text-center text-[11px] text-dms-tecnologia mt-4 mono">© 2026 DMS Logística · v2.4.1</p>

</div>

<script>
function togglePwd(id, btn){
  var i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
